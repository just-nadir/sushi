server {
    server_name savasushi.uz;

    # Admin Panel (Root)
    location / {
        root /var/sushi/client-admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Telegram Client
    location /tg {
        alias /var/sushi/client-telegram/dist;
        index index.html;
        try_files $uri $uri/ /tg/index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Static Uploads
    location /uploads/ {
        proxy_pass http://localhost:3000/uploads/;
        proxy_set_header Host $host;
    }
    
    # Socket.io
    location /socket.io/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        proxy_pass http://localhost:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/savasushi.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/savasushi.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = savasushi.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    server_name savasushi.uz;
    return 404; # managed by Certbot


}
